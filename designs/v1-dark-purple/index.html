<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>futara — dark</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ═══ V1 — DARK PURPLE ══════════════════════════════════════
   Deep dark background, purple/lime accent, Syne headlines.
   All f- classes redefined for this character.
   ══════════════════════════════════════════════════════════ */

/* Design tokens */
:root {
  --bg:#0e0a1a; --bg-2:#16112a; --bg-3:#1e1830; --bg-4:#261f3a;
  --border:rgba(160,140,255,.1); --border-mid:rgba(160,140,255,.18);
  --text:#f0edf5; --text-2:rgba(240,237,245,.6); --text-3:rgba(240,237,245,.35);
  --accent:#6f5ef5; --accent-2:#8b7dfc; --accent-glow:rgba(111,94,245,.2);
  --green:#2dca72; --green-dim:rgba(45,202,114,.14);
  --red:#fc5050;   --red-dim:rgba(252,80,80,.12);
  --amber:#f0a842; --amber-dim:rgba(240,168,66,.12);
  --lime:#c8ff00;
  --r:12px; --r-lg:16px;
  --font-display:'Syne',sans-serif;
  --font-body:'DM Sans',sans-serif;
  --font-mono:'DM Mono',monospace;
  /* semantic mappings */
  --f-bg:#0e0a1a; --f-bg-2:#16112a; --f-bg-3:#1e1830; --f-bg-4:#261f3a;
  --f-text:#f0edf5; --f-muted:rgba(240,237,245,.6); --f-accent:#6f5ef5;
  --f-up:#2dca72; --f-dn:#fc5050; --f-warn:#f0a842;
}

/* V1 overrides — everything else inherits from base CSS */
body { background:var(--bg); color:var(--text); font-family:var(--font-body); }

/* Cursor: purple */
#cursor-dot { background:#8b7dfc; }

/* Nav pills: dark glass */
.f-nav-logo-wrap,#nav.f-nav,.f-nav-right {
  background:rgba(14,10,26,.85);
  border:1px solid rgba(160,140,255,.18);
  box-shadow:0 8px 32px rgba(0,0,0,.4);
}
.f-nav-item { color:rgba(240,237,245,.45); }
.f-nav-item:hover { color:#fff; background:rgba(160,140,255,.1); text-decoration:none; }
.f-nav-item.is-active { background:var(--accent); color:#fff; }
.f-nav-divider { background:rgba(160,140,255,.18); }
.f-nav-search-btn { background:rgba(160,140,255,.15); color:rgba(240,237,245,.6); }
.f-nav-search-input { color:var(--text); }
.f-nav-search-dropdown { background:var(--bg-2); border-color:var(--border-mid); }
.f-nav-btn { background:var(--lime); color:#111; }
.f-nav-btn--profile { background:rgba(160,140,255,.12); color:rgba(240,237,245,.6); }
.f-nav-logo-text { color:var(--text); }
.f-nav-logo-accent { color:var(--accent-2); }

/* Tape: very dark */
.f-tape { background:#06030f; border-bottom-color:rgba(160,140,255,.1); }

/* Cards: dark surface */
.f-card { background:var(--bg-2); border-color:var(--border); border-radius:16px; }
.f-card:hover { border-color:var(--accent); box-shadow:0 0 0 1px var(--accent); }
.f-card-head { border-bottom-color:var(--border); }
.f-card-title { color:rgba(240,237,245,.35); }

/* Buttons */
.f-btn-primary { background:var(--accent); border-radius:10px; }
.f-btn-secondary { background:var(--bg-3); border-color:var(--border-mid); color:var(--text); border-radius:10px; }
.f-btn-secondary:hover { border-color:var(--accent); color:var(--accent-2); }
.f-btn-ghost { background:transparent; border-color:var(--border); color:rgba(240,237,245,.55); border-radius:999px; }
.f-btn-ghost:hover,.f-btn-ghost.is-active { border-color:var(--accent); color:var(--accent-2); }

/* Headlines: Syne ultra-bold */
.f-hero-title { font-family:'Syne',sans-serif; font-weight:800; }
.f-hero-title em { color:var(--accent-2); font-style:normal; }
.f-hero-accent { color:var(--lime); }
.f-markets-title { font-family:'Syne',sans-serif; font-weight:800; }
.f-section-title { font-family:'Syne',sans-serif; font-weight:800; }
.f-dock-val { font-family:'Syne',sans-serif; }
.f-ticker-price { font-family:'Syne',sans-serif; }
.f-port-stat-val { font-family:'Syne',sans-serif; }
.f-hero-price { font-family:'Syne',sans-serif; }

/* Score: green glow */
.f-score-num { color:var(--green); }
.f-score-verdict { background:var(--green-dim); color:var(--green); }
.f-score-bar { background:var(--bg-4); }
.f-score-bar-fill { background:var(--accent); }
.f-score-bar-fill--warn { background:var(--amber); }

/* Deco: bright star */
.f-home-deco-star { mix-blend-mode:screen; color:var(--lime); }
.f-home-deco-grid { background-image:radial-gradient(circle,rgba(91,33,245,.22) 1px,transparent 1px); }
.f-home-deco-blob { background:radial-gradient(ellipse,rgba(91,33,245,.18) 0%,transparent 65%); }

/* Tables */
.f-table th { color:rgba(240,237,245,.35); border-bottom-color:var(--border-mid); }
.f-table td { border-bottom-color:var(--border); color:var(--text-2); }
.f-table td:first-child { color:var(--text); }
.f-table tr:hover td { background:rgba(111,94,245,.06); }

/* Badges */
.f-badge--good { background:var(--green-dim); color:var(--green); }
.f-badge--fair { background:var(--amber-dim); color:var(--amber); }
.f-badge--elite { background:rgba(111,94,245,.15); color:var(--accent-2); }
.f-badge--danger { background:var(--red-dim); color:var(--red); }

/* Misc */
.f-insight { background:var(--bg-3); color:var(--text-2); }
.f-card-body,.f-card-head,.f-watch-list,.f-stock-list { color:var(--text); }
.f-muted,.f-stock-name,.f-hold-sym+div,.f-watch-sym.f-muted { color:var(--text-2); }
.f-label { color:rgba(240,237,245,.35); }
.f-live-dot { color:var(--green); }
.f-sector-fill { background:var(--accent); }
.f-sector-fill.is-up { background:var(--green); }
.f-search-bar { background:var(--bg-2); border-color:var(--border-mid); }
.f-search-bar:focus-within { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-glow); }
.f-search-bar-input { color:var(--text); }
.f-peer-fill--main { background:var(--accent); }
.f-comp-setup,.f-comp-table,.f-battle-card,.f-profile-section,.f-port-stat { background:var(--bg-2); border-color:var(--border); }
.f-comp-table-head,.f-comp-row--actions { background:var(--bg-3); }
.f-comp-section { color:var(--accent-2); background:rgba(111,94,245,.08); }
.f-comp-best { background:rgba(45,202,114,.04); }
.f-select { background:var(--bg-3); border-color:var(--border); color:var(--text); }
.f-toggle { border-color:var(--border); color:rgba(240,237,245,.4); }
.f-toggle.is-active { background:var(--accent); border-color:var(--accent); color:#fff; }
.f-api-field { background:var(--bg-3); border-color:var(--border); }
.f-profile-section-head { border-bottom-color:var(--border); color:rgba(240,237,245,.35); }
.f-setting-row { border-bottom-color:var(--border); }
.f-leverage-card { background:rgba(45,202,114,.06); border-color:rgba(45,202,114,.2); }
.f-heatmap-cell.is-up { background:rgba(45,202,114,.12); }
.f-heatmap-cell.is-dn { background:rgba(252,80,80,.1); }
.f-dock-tab { background:var(--bg-2); border-color:var(--border); }
.f-dock-tab.is-active { background:rgba(111,94,245,.12); border-color:var(--accent); }
.f-dock-tab.is-active .f-dock-label { color:var(--accent-2); }
.f-modal-box { background:var(--bg-2); border-color:var(--border-mid); }
.f-modal-footer { border-top-color:var(--border); }
.f-news-card { background:var(--bg-2); border-color:var(--border); }
.f-news-card:hover { border-color:var(--accent); }
.f-news-card-source { color:var(--accent-2); }
.f-tab { border-color:var(--border); color:rgba(240,237,245,.35); }
.f-tab.is-active { background:var(--accent); border-color:var(--accent); color:#fff; }
.f-comp-input { background:var(--bg-3); border-color:var(--border); color:var(--text); }
.f-comp-input:focus { border-color:var(--accent); }
.f-recent-pill { background:var(--bg-2); border-color:var(--border); }
.f-sector-card { background:var(--bg-2); border-color:var(--border); }
.f-home-grid .f-card,.f-footer { border-color:var(--border); }
.f-footer { border-top-color:var(--border); }
.f-div-bar { background:var(--accent); }
.f-portfolio-stats .f-port-stat { border-color:var(--border); }
.f-markets-left .f-card { border-color:var(--border); }
.f-stat-mini { background:var(--bg-3); }
.f-stress-item { background:var(--bg-3); }
.f-dcf-price--fair { color:var(--green); }
.f-chart-note { background:var(--green-dim); color:var(--green); }
.f-insider-sentiment { background:var(--green-dim); color:var(--green); }
.f-watch-item,.f-stock-row { border-bottom-color:var(--border); }
.f-alloc-dot--muted { background:var(--bg-4); }
.f-score-row { border-bottom-color:var(--border); }
.f-score-explanation { background:var(--bg-3); }

</style>
</head>
<body>
<div id="app"></div>
<script src="../../src/js/templates.js"></script>
<script src="../../src/js/app.js"></script>
</body>
</html>
