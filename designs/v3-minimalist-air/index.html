<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>futara — air</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>

/* ─── CRITICAL LAYOUT (must be in every design) ─────────────── */
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; cursor:none!important; }
html { font-size:16px; }
body { overflow-x:hidden; min-height:100vh; }

/* Tape: fixed top strip */
.f-tape { position:fixed!important; top:0; left:0; right:0; z-index:101; height:30px; overflow:hidden; }
.f-tape-inner { display:flex; height:100%; white-space:nowrap; animation:tapeScroll 80s linear infinite; }
@keyframes tapeScroll { from{transform:translateX(0)} to{transform:translateX(-50%)} }
.f-tape-item { display:inline-flex; align-items:center; gap:10px; height:100%; flex-shrink:0; }

/* Nav logo: fixed left */
.f-nav-logo-wrap { position:fixed!important; top:38px; left:24px; z-index:100; height:46px; display:flex; align-items:center; padding:0 18px; backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px); border-radius:999px; cursor:pointer; }

/* Nav center: fixed center */
#nav.f-nav { position:fixed!important; top:38px; left:50%; transform:translateX(-50%); z-index:100; height:46px; display:flex; align-items:center; padding:0 7px; backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px); border-radius:999px; white-space:nowrap; }
.f-nav-links { display:flex; gap:2px; align-items:center; }
.f-nav-divider { width:1px; height:20px; margin:0 4px; flex-shrink:0; }
.f-nav-search-wrap { display:flex; align-items:center; overflow:hidden; max-width:0; opacity:0; transition:max-width .35s cubic-bezier(.16,1,.3,1), opacity .25s; position:relative; }
.f-nav-search-wrap.is-open { max-width:280px; opacity:1; }
.f-nav-search-input { background:none; border:none; outline:none; width:240px; padding:0 12px; }
.f-nav-search-dropdown { position:absolute; top:calc(100% + 8px); left:0; right:0; padding:6px; z-index:201; display:none; }
.f-nav-search-dropdown.is-open { display:block; }
.f-nav-search-btn { width:30px; height:30px; display:flex; align-items:center; justify-content:center; border-radius:50%; border:none; cursor:pointer; flex-shrink:0; margin-left:6px; }

/* Nav right: fixed right */
.f-nav-right { position:fixed!important; top:38px; right:24px; z-index:100; height:46px; display:flex; align-items:center; padding:0 8px; gap:0; backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px); border-radius:999px; }
.f-nav-btn { width:34px; height:34px; display:flex; align-items:center; justify-content:center; border-radius:50%; border:none; cursor:pointer; flex-shrink:0; }

/* App: push content below nav */
#app { padding-top:96px; position:relative; z-index:1; }

/* Pages: hidden by default */
.f-page { display:none; min-height:calc(100vh - 96px); }
.f-page.is-active { display:block; animation:fadeUp .22s ease; }
@keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }

/* Cursor */
#cursor-dot { position:fixed; border-radius:50%; pointer-events:none; z-index:99999; left:-20px; top:-20px; transform:translate(-50%,-50%); width:10px; height:10px; will-change:left,top; }

/* Modal: hidden by default */
.f-modal { position:fixed; inset:0; z-index:300; display:none; align-items:center; justify-content:center; backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); }
.f-modal.is-open { display:flex; }
.f-modal-box { width:min(720px,92vw); max-height:80vh; overflow:hidden; display:flex; flex-direction:column; }
.f-modal-img { width:100%; height:200px; object-fit:cover; }
.f-modal-body { padding:24px; overflow-y:auto; flex:1; }
.f-modal-footer { padding:16px 24px; display:flex; align-items:center; justify-content:space-between; gap:10px; }

/* Sliders */
input[type=range] { width:100%; height:3px; -webkit-appearance:none; appearance:none; border-radius:2px; outline:none; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:14px; height:14px; border-radius:50%; cursor:pointer; }

/* Tables */
.f-table { width:100%; border-collapse:collapse; }
.f-table th { text-align:left; padding:6px 8px; }
.f-table td { padding:9px 8px; }
.f-table td:first-child { font-weight:500; }

/* Search results */
.sm-result-item { display:flex; align-items:center; gap:12px; padding:9px 12px; transition:background .1s; cursor:pointer; }
.sri-sym { font-weight:700; width:56px; flex-shrink:0; }
.sri-name { flex:1; }
.sri-type { flex-shrink:0; }

/* Dock */
.f-dock { display:flex; gap:10px; overflow-x:auto; padding-bottom:4px; margin-bottom:24px; }
.f-dock::-webkit-scrollbar { height:0; }
.f-dock-tab { flex-shrink:0; padding:10px 14px; min-width:110px; cursor:pointer; transition:all .15s; }
.f-dock-label { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:.12em; margin-bottom:4px; }

/* Analytics rows */
.f-analytics-row { display:grid; gap:14px; margin-bottom:14px; }
.f-analytics-row--3col { grid-template-columns:1fr 1fr 1fr; }
.f-analytics-row--2col-wide { grid-template-columns:2fr 1fr; }
.f-analytics-row--2col { grid-template-columns:1fr 1fr; }

/* Markets layout */
.f-markets-layout { padding:24px 3rem; max-width:1400px; margin:0 auto; display:grid; grid-template-columns:280px 1fr; gap:20px; height:calc(100vh - 96px); overflow:hidden; }
.f-markets-left { display:flex; flex-direction:column; gap:12px; overflow-y:auto; }
.f-markets-right { display:flex; flex-direction:column; overflow:hidden; }
.f-news-filters { display:flex; gap:6px; margin-bottom:12px; flex-wrap:wrap; align-items:center; flex-shrink:0; }
.f-news-feed { flex:1; overflow-y:auto; }
.f-news-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:12px; }
.f-news-card { overflow:hidden; cursor:pointer; transition:border-color .15s, transform .15s; }
.f-news-card-img { width:100%; height:140px; object-fit:cover; display:block; }
.f-news-card-body { padding:12px 14px; }

/* Hero */
.f-hero { padding:80px 3rem 60px; max-width:1400px; margin:0 auto; display:grid; grid-template-columns:1fr 420px; gap:80px; align-items:center; }
@media(max-width:900px) { .f-hero,.f-analytics-row--3col,.f-analytics-row--2col-wide,.f-analytics-row--2col { grid-template-columns:1fr; } }
.f-home-grid { padding:0 3rem 80px; max-width:1400px; margin:0 auto; display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
.f-ticker-hero { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:22px; padding-bottom:20px; }
.f-ticker-actions { display:flex; gap:8px; margin-top:6px; }
.f-score-wrap { text-align:center; padding:16px 0; }
.f-score-breakdown { margin-top:16px; }
.f-score-row { display:flex; align-items:center; gap:8px; padding:7px 0; }
.f-score-row-label { flex:1; }
.f-score-bar { width:80px; height:3px; border-radius:2px; overflow:hidden; flex-shrink:0; }
.f-score-bar-fill { height:100%; border-radius:2px; }
.f-chart-area { position:relative; overflow:hidden; height:160px; }
.f-chart-area canvas { width:100%; height:100%; display:block; }
.f-dcf-prices { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:14px; }
.f-sliders { margin-top:10px; }
.f-slider-row { margin:10px 0; }
.f-slider-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:5px; font-size:12px; }
.f-stresstest { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-top:12px; }
.f-peer-bar { display:flex; align-items:center; gap:10px; margin:8px 0; font-size:12px; }
.f-peer-sym { font-family:var(--font-mono,monospace); font-weight:700; width:44px; flex-shrink:0; }
.f-peer-track { flex:1; height:22px; overflow:hidden; }
.f-peer-fill { height:100%; display:flex; align-items:center; padding-left:8px; font-size:11px; font-weight:700; color:#fff; transition:width .6s; }
.f-insider-row { display:flex; align-items:center; gap:8px; padding:9px 0; font-size:12px; }
.f-insider-info { flex:1; }
.f-stats-mini { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:10px; }
.f-ownership-stats { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:14px; }
.f-div-bar-row { display:flex; align-items:center; gap:8px; margin:5px 0; font-size:11px; }
.f-div-bar { height:7px; border-radius:2px; }
.f-tab-group { display:flex; gap:4px; }
.f-tab { cursor:pointer; transition:all .15s; }
.f-portfolio-layout { max-width:1400px; margin:0 auto; padding:24px 3rem; }
.f-portfolio-header-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
.f-portfolio-stats { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:16px; }
.f-portfolio-grid { display:grid; grid-template-columns:2fr 1fr; gap:16px; }
.f-alloc-list { margin-top:8px; }
.f-alloc-item { display:flex; align-items:center; gap:8px; padding:5px 0; font-size:12px; }
.f-alloc-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.f-leverage-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
.f-leverage-levels { display:flex; gap:16px; margin-top:8px; font-size:11px; }
.f-profile-layout { max-width:700px; margin:0 auto; padding:28px 3rem; }
.f-setting-row { display:flex; align-items:center; justify-content:space-between; padding:11px 0; }
.f-toggle-group { display:flex; gap:4px; }
.f-toggle { cursor:pointer; transition:all .15s; }
.f-api-field { display:flex; align-items:center; gap:10px; padding:10px 14px; margin-top:8px; }
.f-api-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
.f-comp-setup { display:flex; gap:12px; align-items:end; margin-bottom:28px; padding:20px; }
.f-comp-slot { flex:1; }
.f-comp-vs { padding-bottom:4px; flex-shrink:0; }
.f-comp-table-head { display:grid; grid-template-columns:200px 1fr 1fr 1fr; }
.f-comp-col-header { padding:14px 18px; }
.f-comp-sym { font-size:15px; font-weight:800; }
.f-comp-row { display:grid; grid-template-columns:200px 1fr 1fr 1fr; }
.f-comp-cell { padding:10px 18px; font-size:12px; }
.f-battles-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
.f-battle-icon { font-size:18px; margin-bottom:7px; }
.f-battle-title { font-size:13px; font-weight:700; margin-bottom:4px; }
.f-heatmap { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; padding:14px 18px; }
.f-heatmap-cell { padding:9px 8px; text-align:center; cursor:pointer; font-weight:700; }
.f-sector-row { display:flex; align-items:center; gap:10px; margin:6px 0; font-size:12px; }
.f-sector-name { width:90px; }
.f-sector-track { flex:1; height:3px; border-radius:2px; overflow:hidden; }
.f-sector-fill { height:100%; border-radius:2px; }
.f-watch-item,.f-stock-row { display:flex; align-items:center; gap:10px; padding:9px 0; cursor:pointer; }
.f-watch-sym,.f-stock-sym { font-weight:700; width:50px; flex-shrink:0; }
.f-stock-rank { font-size:11px; width:14px; flex-shrink:0; }
.f-stock-info { flex:1; }
.f-stock-name,.f-hold-sym+div { font-size:11px; }
.f-stock-price,.f-stock-chg { font-size:12px; font-family:var(--font-mono,monospace); }
.f-stock-chg { min-width:68px; text-align:right; font-weight:600; }
.f-recent-pills { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-bottom:28px; }
.f-recent-pill { padding:9px 18px; cursor:pointer; transition:all .15s; text-align:center; }
.f-recent-sym { font-size:14px; font-weight:700; font-family:var(--font-mono,monospace); }
.f-recent-score { font-size:11px; margin-top:2px; }
.f-sectors-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; text-align:left; }
.f-sector-card { padding:14px; cursor:pointer; transition:all .15s; }
.f-sector-card-icon { font-size:18px; margin-bottom:6px; }
.f-sector-card-name { font-size:13px; font-weight:600; }
.f-sector-card-top { font-size:11px; margin-top:5px; font-weight:500; }
.f-analytics-layout { max-width:1400px; margin:0 auto; padding:28px 3rem; }
.f-analytics-start { max-width:760px; margin:0 auto; padding:60px 3rem; text-align:center; }
.f-comparison-layout { max-width:1400px; margin:0 auto; padding:24px 3rem; }
.f-comp-table { overflow:hidden; margin-bottom:20px; }
.f-footer { padding:20px 3rem; max-width:1400px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; font-size:12px; background-image:radial-gradient(circle,rgba(91,33,245,.15) 1px,transparent 1px); background-size:28px 28px; }
.f-footer-links { display:flex; gap:18px; }
.f-home-deco-grid,.f-home-deco-blob,.f-home-deco-star { position:absolute; pointer-events:none; }
.f-home-deco-grid { inset:0; background-size:26px 26px; }
.f-home-deco-star { right:6vw; top:32%; font-size:clamp(4rem,9vw,7rem); animation:decoSpin 20s linear infinite; user-select:none; line-height:1; }
@keyframes decoSpin { to{transform:rotate(360deg)} }
.f-home-content { position:relative; z-index:1; }
.f-page--home { position:relative; overflow:hidden; }
.f-search-bar { display:flex; max-width:540px; overflow:hidden; transition:border-color .15s, box-shadow .15s; }
.f-search-bar-input { flex:1; background:none; border:none; outline:none; padding:13px 20px; }
.f-quick-tickers { display:flex; gap:7px; flex-wrap:wrap; margin-top:14px; }
.f-loading-screen { text-align:center; padding:80px 0; }
.f-loading-bar-wrap { width:200px; height:3px; border-radius:2px; margin:16px auto; overflow:hidden; }
.f-loading-bar { height:100%; border-radius:2px; animation:loadAnim 1.5s ease-in-out infinite; }
@keyframes loadAnim { 0%{width:0;margin-left:0}50%{width:60%;margin-left:20%}100%{width:0;margin-left:100%} }
.f-sentiment-bar { display:flex; height:4px; border-radius:3px; overflow:hidden; margin:8px 0; }
.f-sentiment-legend { display:flex; gap:14px; font-size:11px; }
.f-hero-sub { max-width:460px; margin-bottom:32px; font-weight:300; line-height:1.7; }
.f-label { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.16em; margin-bottom:6px; display:block; }
.f-live-dot { font-size:10px; }
.f-loading { padding:20px; text-align:center; font-size:12px; opacity:.5; }
.f-insight { padding:10px 12px; font-size:12px; line-height:1.6; margin-top:10px; }
.f-badge { display:inline-flex; padding:2px 8px; border-radius:999px; font-size:9px; font-weight:800; font-family:var(--font-mono,monospace); }
.f-score-explanation { margin-top:12px; padding:10px 12px; font-size:12px; line-height:1.6; }
.f-insider-sentiment { padding:7px 10px; font-size:12px; margin-bottom:12px; }
.is-up { color:var(--f-up,#2dca72)!important; }
.is-dn { color:var(--f-dn,#fc5050)!important; }
.f-warn { color:var(--f-warn,#f0a842); }
.f-mono { font-family:var(--font-mono,'DM Mono',monospace); }
.f-muted { color:var(--f-muted,#888); }

/* ═══ V3 — MINIMALIST AIR ══════════════════════════════════
   Near-white background, almost no color, just weight and space.
   Cormorant Garamond for display. Ultra-thin lines only.
   ══════════════════════════════════════════════════════════ */

:root {
  --bg:#fafaf8; --bg-2:#f2f1ee; --bg-3:#e8e7e3; --bg-4:#dddbd6;
  --border:rgba(10,10,10,.08); --border-mid:rgba(10,10,10,.15);
  --text:#0a0a0a; --text-2:#888; --text-3:#bbb;
  --accent:#0a0a0a; --accent-2:#333;
  --green:#2a7a4a; --green-dim:rgba(42,122,74,.1);
  --red:#c03030; --red-dim:rgba(192,48,48,.08);
  --amber:#8a6800; --amber-dim:rgba(138,104,0,.1);
  --lime:#c8ff00;
  --r:0px; --r-lg:0px;
  --font-display:'Cormorant Garamond',serif;
  --font-body:'Inter',sans-serif;
  --font-mono:'DM Mono',monospace;
  --f-bg:#fafaf8; --f-bg-2:#f2f1ee; --f-bg-3:#e8e7e3; --f-bg-4:#dddbd6;
  --f-text:#0a0a0a; --f-muted:#888; --f-accent:#0a0a0a;
  --f-up:#2a7a4a; --f-dn:#c03030; --f-warn:#8a6800;
}

body { background:var(--bg); color:var(--text); font-family:var(--font-body); font-size:13px; font-weight:300; }

/* Cursor: tiny ink dot */
#cursor-dot { width:8px; height:8px; background:var(--text); }
#cursor-dot:hover { transform:translate(-50%,-50%) scale(.5); }

/* Nav: invisible, only lines */
.f-nav-logo-wrap,#nav.f-nav,.f-nav-right {
  background:rgba(250,250,248,.97);
  border:1px solid rgba(10,10,10,.1);
  box-shadow:none;
}
.f-nav-item { color:rgba(10,10,10,.4); font-weight:300; letter-spacing:.08em; text-transform:uppercase; font-size:11px; }
.f-nav-item:hover { color:var(--text); background:none; text-decoration:none; border-bottom:1px solid var(--text); border-radius:0; padding-bottom:4px; }
.f-nav-item.is-active { background:var(--text); color:#fff; border-radius:0; }
.f-nav-divider { background:rgba(10,10,10,.1); }
.f-nav-search-btn { background:transparent; border:1px solid rgba(10,10,10,.15); border-radius:0; color:var(--text-2); }
.f-nav-search-input { color:var(--text); font-weight:300; }
.f-nav-search-dropdown { background:var(--bg); border-color:var(--text); border-radius:0; box-shadow:2px 2px 0 var(--text); }
.f-nav-btn { background:var(--text); color:#fff; border-radius:0; }
.f-nav-btn--profile { background:transparent; border:1px solid rgba(10,10,10,.15); color:var(--text-2); border-radius:0; }
.f-nav-logo-text { font-family:'Cormorant Garamond',serif; font-size:18px; font-weight:300; letter-spacing:.06em; color:var(--text); }
.f-nav-logo-accent { font-style:italic; }

/* Tape: thin dark line */
.f-tape { background:#0a0a0a; border-bottom:1px solid rgba(255,255,255,.05); height:28px; }
.f-tape-item { font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:rgba(255,255,255,.4); padding:0 24px; }
.f-tape-sym { color:rgba(255,255,255,.75); }

/* Cards: just borders, no fill */
.f-card { background:transparent; border:1px solid var(--border); border-radius:0; box-shadow:none; }
.f-card:hover { border-color:var(--text); box-shadow:none; transform:none; background:transparent; }
.f-card-head { border-bottom:1px solid var(--border); }
.f-card-title { font-size:8px; letter-spacing:.24em; color:var(--text-3); }

/* Buttons: underline only */
.f-btn-primary { background:var(--text); color:#fff; border-radius:0; font-family:inherit; font-weight:400; letter-spacing:.1em; text-transform:uppercase; font-size:11px; padding:10px 24px; }
.f-btn-secondary { background:transparent; border:none; border-bottom:1px solid var(--text); border-radius:0; color:var(--text); padding:0 0 2px 0; font-size:11px; letter-spacing:.1em; text-transform:uppercase; }
.f-btn-secondary:hover { background:transparent; color:var(--text); border-color:var(--text); }
.f-btn-ghost { background:transparent; border:none; border-bottom:1px solid rgba(10,10,10,.15); border-radius:0; color:var(--text-2); font-size:10px; letter-spacing:.1em; text-transform:uppercase; padding:0 0 2px 0; }
.f-btn-ghost:hover,.f-btn-ghost.is-active { color:var(--text); border-bottom-color:var(--text); }

/* Headlines: Cormorant, light weight */
.f-hero-title { font-family:'Cormorant Garamond',serif; font-weight:300; font-size:clamp(4rem,8vw,8rem); letter-spacing:-.01em; }
.f-hero-title em { font-style:italic; color:var(--text-2); }
.f-hero-accent { font-style:italic; color:var(--text-2); }
.f-markets-title { font-family:'Cormorant Garamond',serif; font-weight:300; font-size:clamp(3rem,5vw,5rem); }
.f-section-title { font-family:'Cormorant Garamond',serif; font-weight:300; font-size:2.5rem; letter-spacing:-.02em; }
.f-dock-val { font-family:'Cormorant Garamond',serif; font-weight:300; font-size:1.6rem; }
.f-ticker-price { font-family:'Cormorant Garamond',serif; font-weight:300; font-size:clamp(3rem,6vw,5.5rem); letter-spacing:-.02em; }
.f-port-stat-val { font-family:'Cormorant Garamond',serif; font-weight:300; font-size:2.2rem; }
.f-hero-price { font-family:'Cormorant Garamond',serif; font-weight:300; }
.f-dcf-price { font-family:'Cormorant Garamond',serif; font-weight:300; font-size:2.5rem; }
.f-comp-vs { font-family:'Cormorant Garamond',serif; font-weight:300; font-size:1.5rem; }

/* Score */
.f-score-num { font-family:'Cormorant Garamond',serif; font-weight:300; font-size:5rem; color:var(--green); }
.f-score-verdict { background:transparent; color:var(--green); border:1px solid var(--green); border-radius:0; font-size:8px; letter-spacing:.2em; }
.f-score-bar { background:rgba(10,10,10,.1); height:1px; }
.f-score-bar-fill { background:var(--text); height:1px; }
.f-score-bar-fill--warn { background:var(--amber); }

/* Deco */
.f-home-deco-star { mix-blend-mode:multiply; color:#c8ff00; opacity:.25; }
.f-home-deco-grid { background-image:radial-gradient(circle,rgba(10,10,10,.06) 1px,transparent 1px); }
.f-home-deco-blob { opacity:.3; }

/* Tables: hairlines */
.f-table th { color:var(--text-3); border-bottom:1px solid var(--text); font-size:8px; letter-spacing:.2em; }
.f-table td { border-bottom:1px solid var(--border); color:var(--text-2); }
.f-table td:first-child { color:var(--text); font-weight:400; }
.f-table tr:hover td { background:var(--bg-2); }

/* Badges: just text, bordered box */
.f-badge { border-radius:0; border:1px solid rgba(10,10,10,.15); background:transparent; font-size:8px; letter-spacing:.08em; }
.f-badge--good { border-color:rgba(42,122,74,.3); color:var(--green); background:transparent; }
.f-badge--fair { border-color:rgba(138,104,0,.3); color:var(--amber); background:transparent; }
.f-badge--elite { border-color:rgba(10,10,10,.15); color:var(--text-2); background:transparent; }
.f-badge--danger { border-color:rgba(192,48,48,.3); color:var(--red); background:transparent; }

/* Misc */
.f-insight { background:var(--bg-2); border-left:1px solid var(--text); border-radius:0; color:var(--text-2); }
.f-search-bar { background:transparent; border:none; border-bottom:1px solid var(--border); border-radius:0; }
.f-search-bar:focus-within { border-bottom-color:var(--text); box-shadow:none; }
.f-search-bar-input { color:var(--text); font-weight:300; font-size:14px; }
.f-peer-fill--main { background:var(--text); }
.f-peer-fill--comp { background:rgba(10,10,10,.3); color:#fff; }
.f-peer-track { background:rgba(10,10,10,.08); border-radius:0; height:1px; }
.f-peer-fill { height:1px; color:transparent; font-size:0; }
.f-comp-setup,.f-battle-card { background:transparent; border:1px solid var(--border); border-radius:0; }
.f-comp-table { background:transparent; border:1px solid var(--border); border-radius:0; }
.f-comp-table-head { background:var(--bg-2); border-bottom:1px solid var(--text); }
.f-comp-row--actions { background:var(--bg-2); }
.f-comp-section { background:var(--text); color:#fff; font-size:8px; letter-spacing:.2em; }
.f-comp-best { background:rgba(42,122,74,.04); }
.f-select { background:transparent; border:none; border-bottom:1px solid var(--border); border-radius:0; color:var(--text); font-weight:300; }
.f-toggle { border-color:var(--border); color:var(--text-2); border-radius:0; font-size:10px; letter-spacing:.1em; text-transform:uppercase; }
.f-toggle.is-active { background:var(--text); color:#fff; border-color:var(--text); }
.f-api-field { background:var(--bg-2); border:1px solid var(--border); border-radius:0; }
.f-profile-section { background:transparent; border:1px solid var(--border); border-radius:0; }
.f-profile-section-head { color:var(--text-3); border-bottom:1px solid var(--text); font-size:8px; letter-spacing:.2em; }
.f-setting-row { border-bottom:1px solid var(--border); }
.f-leverage-card { background:rgba(42,122,74,.04); border:1px solid rgba(42,122,74,.2); border-radius:0; }
.f-heatmap-cell { border-radius:0; }
.f-heatmap-cell.is-up { background:rgba(42,122,74,.08); }
.f-heatmap-cell.is-dn { background:rgba(192,48,48,.06); }
.f-dock-tab { background:transparent; border:none; border-right:1px solid var(--border); border-radius:0; padding:20px 28px; min-width:120px; }
.f-dock-tab.is-active { background:var(--text); color:#fff; }
.f-dock-tab.is-active .f-dock-label { color:rgba(255,255,255,.4); }
.f-dock-label { font-size:8px; letter-spacing:.2em; text-transform:uppercase; color:var(--text-3); }
.f-modal-box { background:var(--bg); border:1px solid var(--text); border-radius:0; box-shadow:4px 4px 0 rgba(10,10,10,.2); }
.f-modal-footer { border-top:1px solid var(--border); }
.f-modal-source { color:var(--text); font-size:9px; letter-spacing:.2em; text-transform:uppercase; }
.f-news-card { background:transparent; border:1px solid var(--border); border-radius:0; }
.f-news-card:hover { border-color:var(--text); box-shadow:2px 2px 0 var(--text); transform:none; }
.f-news-card-source { color:var(--text); font-size:9px; letter-spacing:.16em; text-transform:uppercase; }
.f-news-card-title { font-weight:400; }
.f-tab { border:none; border-bottom:1px solid var(--border); border-radius:0; font-size:9px; letter-spacing:.14em; text-transform:uppercase; color:var(--text-2); padding:4px 0; margin-right:12px; }
.f-tab.is-active { border-bottom-color:var(--text); color:var(--text); background:transparent; }
.f-comp-input { background:transparent; border:none; border-bottom:1px solid var(--text); border-radius:0; font-family:'Cormorant Garamond',serif; font-size:2rem; font-weight:300; color:var(--text); padding:6px 0; }
.f-recent-pill { background:transparent; border:1px solid var(--border); border-radius:0; }
.f-recent-pill:hover { box-shadow:2px 2px 0 var(--text); }
.f-sector-card { background:transparent; border:1px solid var(--border); border-radius:0; }
.f-sector-card:hover { box-shadow:2px 2px 0 var(--text); transform:none; border-color:var(--text); background:transparent; }
.f-div-bar { background:var(--text); height:1px; border-radius:0; }
.f-stat-mini { background:var(--bg-2); border-radius:0; }
.f-stress-item { background:var(--bg-2); border:1px solid var(--border); border-radius:0; }
.f-dcf-price--fair { color:var(--green); }
.f-chart-note { background:transparent; border-left:1px solid var(--green); border-radius:0; padding-left:10px; color:var(--green); }
.f-chart-note::before { content:"— "; }
.f-insider-sentiment { background:transparent; border-left:1px solid var(--green); color:var(--green); }
.f-footer { background:none; border-top:1px solid var(--border); }
.f-loading-bar { background:var(--text); }
.f-sentiment-bar { height:1px; }
.f-sentiment-bar-bull { background:var(--green); }
.f-sentiment-bar-neu { background:var(--amber); }
.f-sentiment-bar-bear { background:var(--red); }
.f-score-row { border-bottom:1px solid var(--border); }
.f-dock { border-bottom:1px solid var(--border); }
.f-watch-item,.f-stock-row { border-bottom:1px solid var(--border); }
.f-alloc-item { border-bottom:1px solid var(--border); }

</style>
