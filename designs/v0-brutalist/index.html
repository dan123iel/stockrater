<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>futara . quantitative equity engine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Space+Grotesk:wght@400;700&family=Space+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #09090b;
      --surface: #141416;
      --surface-card: #1c1c1e;
      --border: rgba(255,255,255,0.07);
      --border-bright: rgba(255,255,255,0.18);
      --text: #f4f4f5;
      --text-2: #a1a1aa;
      --text-3: #52525b;
      --lime: #d4ff00;
      --red: #ff0055;
      --blue: #00e5ff;
      --purple: #8b5cf6;
      --green: #22c55e;
      --ease: cubic-bezier(0.16,1,0.3,1);
      --font-sans: 'Plus Jakarta Sans', sans-serif;
      --font-head: 'Space Grotesk', sans-serif;
      --font-mono: 'Space Mono', monospace;
    }
    *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; cursor:none!important; }
    ::selection { background:var(--lime); color:#000; }
    html { font-size:16px; scroll-behavior:smooth; }
    body { background:var(--bg); color:var(--text); font-family:var(--font-sans); -webkit-font-smoothing:antialiased; overflow-x:hidden; min-height:100vh; }

    /* CURSOR */
    #cur { position:fixed; width:10px; height:10px; background:var(--purple); border-radius:50%; pointer-events:none; z-index:9999; top:-20px; left:-20px; transform:translate(-50%,-50%); transition:width .15s var(--ease),height .15s var(--ease),background .15s; }
    #cur.hover { width:32px; height:32px; background:transparent; border:1.5px solid var(--purple); }

    /* NAV */
    header {
      position:fixed; top:0; left:0; right:0; z-index:100;
      background:rgba(9,9,11,0.85); backdrop-filter:blur(16px);
      border-bottom:1px solid var(--border);
      padding:0 40px; height:56px;
      display:flex; align-items:center; gap:0;
    }
    .logo {
      font-family:var(--font-head); font-size:17px; font-weight:700;
      letter-spacing:-0.04em; color:var(--text);
      margin-right:40px; flex-shrink:0;
    }
    .logo span { color:var(--lime); }
    nav { display:flex; gap:4px; flex:1; }
    .nav-link {
      font-size:13px; font-weight:600; color:var(--text-2);
      padding:6px 14px; border-radius:100px;
      transition:all .4s var(--ease); border:1px solid transparent;
    }
    .nav-link:hover { color:var(--text); background:rgba(255,255,255,0.04); }
    .nav-link.active { color:#000; background:var(--lime); border-color:var(--lime); }

    /* PAGES */
    #app { padding-top:56px; }
    .page { display:none; min-height:calc(100vh - 56px); padding:60px 40px 40px; }
    .page.active { display:block; animation:fadeUp .6s var(--ease) forwards; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }

    /* EYEBROW */
    .eyebrow {
      font-family:var(--font-mono); font-size:11px; text-transform:uppercase;
      letter-spacing:.18em; color:var(--lime); margin-bottom:20px;
    }

    /* GIANT TITLE */
    .giant {
      font-family:var(--font-head);
      font-size:clamp(52px,9vw,120px);
      font-weight:700; line-height:.9; letter-spacing:-.05em;
      margin-bottom:40px;
    }
    .giant .outline {
      -webkit-text-stroke:1.5px var(--text);
      -webkit-text-fill-color:transparent;
    }

    /* BENTO GRID */
    .bento { display:grid; grid-template-columns:repeat(12,1fr); gap:16px; }
    .card {
      background:var(--surface); border:1px solid var(--border);
      border-radius:20px; padding:28px;
      transition:border-color .5s var(--ease), transform .5s var(--ease), box-shadow .5s var(--ease);
      position:relative; overflow:hidden;
    }
    .card:hover { border-color:var(--border-bright); transform:translateY(-3px); box-shadow:0 24px 48px rgba(0,0,0,.5); }
    .c12{grid-column:span 12} .c8{grid-column:span 8} .c6{grid-column:span 6}
    .c4{grid-column:span 4} .c3{grid-column:span 3}
    @media(max-width:900px){.c8,.c6,.c4,.c3{grid-column:span 12}}

    /* STAT */
    .stat-label { font-family:var(--font-mono); font-size:10px; text-transform:uppercase; letter-spacing:.1em; color:var(--text-3); margin-bottom:8px; }
    .stat-val { font-family:var(--font-head); font-size:40px; font-weight:700; letter-spacing:-.04em; line-height:1; }
    .stat-bar { height:3px; background:rgba(255,255,255,.06); border-radius:2px; margin-top:16px; overflow:hidden; }
    .stat-fill { height:100%; background:var(--lime); border-radius:2px; transition:width .8s var(--ease); }

    /* TICKER TAPE */
    #tape {
      position:fixed; top:56px; left:0; right:0; z-index:99;
      height:30px; background:#0d0d10;
      border-bottom:1px solid var(--border); overflow:hidden;
    }
    .tape-inner { display:flex; height:100%; white-space:nowrap; animation:scroll 60s linear infinite; }
    @keyframes scroll { from{transform:translateX(0)} to{transform:translateX(-50%)} }
    .tape-item {
      display:inline-flex; align-items:center; gap:8px;
      padding:0 32px; font-size:11px; font-family:var(--font-mono);
      border-right:1px solid var(--border); height:100%; color:rgba(255,255,255,.45);
    }
    .tape-sym { color:rgba(255,255,255,.8); font-weight:600; }
    .up{color:#22c55e} .dn{color:var(--red)}

    /* NEWS — editorial row */
    .news-row {
      border-bottom:1px solid var(--border);
      padding:20px 0;
      display:grid; grid-template-columns:auto 1fr auto;
      gap:28px; align-items:center;
      transition:border-color .4s var(--ease);
    }
    .news-row:hover { border-bottom-color:var(--lime); }
    .news-row:hover .news-head { color:var(--lime); }
    .news-tag {
      font-family:var(--font-mono); font-size:10px; text-transform:uppercase;
      padding:4px 8px; border-radius:4px;
      background:rgba(212,255,0,.1); color:var(--lime);
    }
    .news-tag.tech { background:rgba(0,229,255,.1); color:var(--blue); }
    .news-tag.risk { background:rgba(255,0,85,.1); color:var(--red); }
    .news-head { font-family:var(--font-head); font-size:18px; font-weight:700; transition:color .4s var(--ease); }
    .news-time { font-family:var(--font-mono); font-size:11px; color:var(--text-3); }

    /* SEARCH */
    .acid-input {
      width:100%; background:transparent; border:none;
      border-bottom:2px solid var(--border);
      font-family:var(--font-head); font-size:clamp(28px,5vw,52px);
      font-weight:700; color:var(--text); padding:16px 0; outline:none;
      transition:border-color .4s var(--ease);
    }
    .acid-input:focus { border-bottom-color:var(--lime); }
    .acid-input::placeholder { color:var(--text-3); }

    /* SCORE RING */
    .score-ring { text-align:center; padding:20px 0; }
    .score-num {
      font-family:var(--font-head); font-size:72px; font-weight:700;
      letter-spacing:-.06em; color:var(--lime); line-height:1;
    }
    .score-sub { font-size:18px; color:var(--text-3); }
    .verdict {
      display:inline-block; margin-top:8px; padding:6px 18px;
      background:rgba(212,255,0,.12); color:var(--lime);
      border-radius:100px; font-size:11px; font-weight:700;
      text-transform:uppercase; letter-spacing:.12em;
    }

    /* COMPARISON TABLE */
    .comp-table { width:100%; border-collapse:collapse; font-size:13px; }
    .comp-table th { padding:8px 16px; font-family:var(--font-mono); font-size:10px; text-transform:uppercase; letter-spacing:.1em; color:var(--text-3); border-bottom:1px solid var(--border); text-align:left; }
    .comp-table td { padding:12px 16px; border-bottom:1px solid var(--border); }
    .comp-table tr:hover td { background:rgba(255,255,255,.02); }
    .best { color:var(--lime); font-weight:700; }

    /* FOOTER */
    footer {
      border-top:1px solid var(--border); padding:20px 40px;
      display:flex; justify-content:space-between; align-items:center;
      font-size:11px; color:var(--text-3); font-family:var(--font-mono);
      background-image:radial-gradient(circle,rgba(139,92,246,.15) 1px,transparent 1px);
      background-size:28px 28px;
    }
    footer a { color:var(--text-3); text-decoration:none; transition:color .2s; }
    footer a:hover { color:var(--lime); }

    /* PORTFOLIO */
    .hold-row { display:flex; align-items:center; gap:12px; padding:14px 0; border-bottom:1px solid var(--border); }
    .hold-row:last-child { border:none; }
    .hold-sym { font-family:var(--font-mono); font-weight:700; font-size:15px; width:60px; }
    .hold-info { flex:1; }
    .hold-name { font-size:11px; color:var(--text-3); }
    .hold-alloc { font-family:var(--font-mono); font-size:12px; color:var(--text-2); }
    .hold-ret { font-family:var(--font-mono); font-weight:700; font-size:13px; min-width:70px; text-align:right; }

    /* PROFILE */
    .setting { display:flex; align-items:center; justify-content:space-between; padding:14px 0; border-bottom:1px solid var(--border); }
    .setting:last-child { border:none; }
    .setting-label { font-size:14px; font-weight:600; }
    .setting-desc { font-size:12px; color:var(--text-3); margin-top:2px; }
    .pill-toggle { display:flex; gap:4px; }
    .ptbtn { padding:6px 16px; border-radius:100px; font-size:12px; font-weight:600; border:1px solid var(--border); color:var(--text-3); background:transparent; transition:all .3s var(--ease); }
    .ptbtn.on { background:var(--lime); color:#000; border-color:var(--lime); }
  </style>
</head>
<body>
<div id="app"></div>
<script src="../../src/js/templates.js"></script>
<script src="../../src/js/app.js"></script>
</body>
</html>
