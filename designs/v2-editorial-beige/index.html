<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>futara — editorial</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ═══ V2 — EDITORIAL BEIGE ══════════════════════════════════
   Warm paper background, dark ink, serif headlines.
   Inspired by fine editorial design and print media.
   ══════════════════════════════════════════════════════════ */

:root {
  --bg:#f0ede8; --bg-2:#e8e4de; --bg-3:#dfd9d0; --bg-4:#d0c8bc;
  --border:rgba(13,13,13,.1); --border-mid:rgba(13,13,13,.18);
  --text:#0d0d0d; --text-2:#6b6b6b; --text-3:#aaa;
  --accent:#0d0d0d; --accent-2:#333;
  --green:#1a6e3c; --green-dim:rgba(26,110,60,.1);
  --red:#b83232; --red-dim:rgba(184,50,50,.08);
  --amber:#8a6a00; --amber-dim:rgba(138,106,0,.1);
  --lime:#c8ff00;
  --r:8px; --r-lg:12px;
  --font-display:'DM Serif Display',serif;
  --font-body:'DM Sans',sans-serif;
  --font-mono:'DM Mono',monospace;
  --f-bg:#f0ede8; --f-bg-2:#e8e4de; --f-bg-3:#dfd9d0; --f-bg-4:#d0c8bc;
  --f-text:#0d0d0d; --f-muted:#6b6b6b; --f-accent:#0d0d0d;
  --f-up:#1a6e3c; --f-dn:#b83232; --f-warn:#8a6a00;
}

body { background:var(--bg); color:var(--text); font-family:var(--font-body); }

/* Cursor: ink dot */
#cursor-dot { background:var(--text); mix-blend-mode:multiply; }

/* Nav: warm translucent */
.f-nav-logo-wrap,#nav.f-nav,.f-nav-right {
  background:rgba(240,237,232,.9);
  border:1px solid rgba(13,13,13,.12);
  box-shadow:0 2px 12px rgba(13,13,13,.08);
}
.f-nav-item { color:rgba(13,13,13,.5); }
.f-nav-item:hover { color:var(--text); background:none; text-decoration:underline; text-underline-offset:4px; }
.f-nav-item.is-active { background:var(--text); color:#fff; }
.f-nav-divider { background:rgba(13,13,13,.15); }
.f-nav-search-btn { background:rgba(13,13,13,.08); color:var(--text-2); }
.f-nav-search-input { color:var(--text); }
.f-nav-search-dropdown { background:var(--bg); border-color:var(--border-mid); box-shadow:0 4px 20px rgba(13,13,13,.12); }
.f-nav-btn { background:var(--text); color:#fff; }
.f-nav-btn--profile { background:rgba(13,13,13,.08); color:var(--text-2); }
.f-nav-logo-text { color:var(--text); font-family:'DM Serif Display',serif; font-weight:400; letter-spacing:.02em; }
.f-nav-logo-accent { font-style:italic; }

/* Tape: ink dark strip */
.f-tape { background:#0d0d0d; border-bottom:1px solid rgba(255,255,255,.06); }
.f-tape-item { color:rgba(255,255,255,.5); }
.f-tape-sym { color:rgba(255,255,255,.85); }

/* Cards: paper surface, 1px borders */
.f-card { background:var(--bg); border:1px solid var(--border); border-radius:var(--r); box-shadow:none; }
.f-card:hover { border-color:var(--text); box-shadow:none; transform:none; }
.f-card-head { border-bottom:1px solid var(--border); }
.f-card-title { color:var(--text-3); letter-spacing:.2em; }

/* Buttons: ink filled or lined */
.f-btn-primary { background:var(--text); color:#fff; border-radius:0; font-family:'DM Serif Display',serif; letter-spacing:.04em; }
.f-btn-primary:hover { opacity:.8; }
.f-btn-secondary { background:transparent; border:1.5px solid var(--text); color:var(--text); border-radius:0; }
.f-btn-secondary:hover { background:var(--text); color:#fff; }
.f-btn-ghost { background:transparent; border:1px solid var(--border); color:var(--text-2); border-radius:0; }
.f-btn-ghost:hover,.f-btn-ghost.is-active { border-color:var(--text); color:var(--text); background:none; }

/* Headlines: Serif Display */
.f-hero-title { font-family:'DM Serif Display',serif; font-weight:400; font-style:normal; letter-spacing:-.02em; }
.f-hero-title em { color:var(--text); font-style:italic; }
.f-hero-accent { color:var(--text); font-style:italic; }
.f-markets-title { font-family:'DM Serif Display',serif; font-weight:400; font-style:normal; }
.f-section-title { font-family:'DM Serif Display',serif; font-weight:400; }
.f-dock-val { font-family:'DM Serif Display',serif; font-weight:400; }
.f-ticker-price { font-family:'DM Serif Display',serif; font-weight:400; }
.f-port-stat-val { font-family:'DM Serif Display',serif; font-weight:400; }
.f-hero-price { font-family:'DM Serif Display',serif; }
.f-dcf-price { font-family:'DM Serif Display',serif; font-weight:400; }

/* Score */
.f-score-num { color:var(--green); font-family:'DM Serif Display',serif; font-weight:400; }
.f-score-verdict { background:transparent; color:var(--green); border:1px solid var(--green); border-radius:0; }
.f-score-bar { background:var(--bg-4); }
.f-score-bar-fill { background:var(--text); }
.f-score-bar-fill--warn { background:var(--amber); }

/* Deco */
.f-home-deco-star { mix-blend-mode:multiply; color:#c8ff00; opacity:.4; }
.f-home-deco-grid { background-image:radial-gradient(circle,rgba(13,13,13,.08) 1px,transparent 1px); }
.f-home-deco-blob { background:radial-gradient(ellipse,rgba(13,13,13,.04) 0%,transparent 65%); }

/* Tables */
.f-table th { color:var(--text-3); border-bottom:2px solid var(--text); }
.f-table td { border-bottom-color:var(--border); color:var(--text-2); }
.f-table td:first-child { color:var(--text); }
.f-table tr:hover td { background:var(--bg-2); }

/* Badges */
.f-badge--good { background:rgba(26,110,60,.1); color:var(--green); border-radius:0; }
.f-badge--fair { background:rgba(138,106,0,.1); color:var(--amber); border-radius:0; }
.f-badge--elite { background:rgba(13,13,13,.08); color:var(--text); border-radius:0; }
.f-badge--danger { background:rgba(184,50,50,.08); color:var(--red); border-radius:0; }

/* Misc */
.f-insight { background:var(--bg-2); color:var(--text-2); border-left:2px solid var(--text); border-radius:0; }
.f-search-bar { background:var(--bg-2); border:1px solid var(--border); border-radius:0; }
.f-search-bar:focus-within { border-color:var(--text); box-shadow:none; }
.f-search-bar-input { color:var(--text); }
.f-peer-fill--main { background:var(--text); }
.f-peer-fill--comp { background:rgba(13,13,13,.35); color:#fff; }
.f-comp-setup,.f-battle-card,.f-port-stat { background:var(--bg); border-color:var(--border); }
.f-comp-table { background:var(--bg); border-color:var(--border); border-radius:0; }
.f-comp-table-head,.f-comp-row--actions { background:var(--bg-2); }
.f-comp-section { background:var(--text); color:#fff; }
.f-comp-best { background:rgba(26,110,60,.04); }
.f-select { background:var(--bg); border-color:var(--border); border-radius:0; color:var(--text); }
.f-toggle { border-color:var(--border); color:var(--text-2); border-radius:0; }
.f-toggle.is-active { background:var(--text); color:#fff; border-color:var(--text); }
.f-api-field { background:var(--bg-2); border-color:var(--border); border-radius:0; }
.f-profile-section { background:var(--bg); border-color:var(--border); border-radius:0; }
.f-profile-section-head { color:var(--text-3); border-bottom-color:var(--text); }
.f-setting-row { border-bottom-color:var(--border); }
.f-leverage-card { background:rgba(26,110,60,.06); border-color:rgba(26,110,60,.2); border-radius:0; }
.f-heatmap-cell.is-up { background:rgba(26,110,60,.1); }
.f-heatmap-cell.is-dn { background:rgba(184,50,50,.07); }
.f-dock-tab { background:var(--bg); border-color:var(--border); border-radius:0; }
.f-dock-tab.is-active { background:var(--text); color:#fff; border-color:var(--text); }
.f-dock-tab.is-active .f-dock-label { color:rgba(255,255,255,.5); }
.f-dock-label { color:var(--text-3); }
.f-modal-box { background:var(--bg); border-color:var(--border-mid); border-radius:0; }
.f-modal-footer { border-top-color:var(--border); }
.f-modal-source { color:var(--text); }
.f-news-card { background:var(--bg); border-color:var(--border); border-radius:0; }
.f-news-card:hover { border-color:var(--text); transform:none; box-shadow:2px 2px 0 var(--text); }
.f-news-card-source { color:var(--text); }
.f-tab { border-color:var(--border); color:var(--text-3); border-radius:0; }
.f-tab.is-active { background:var(--text); border-color:var(--text); color:#fff; }
.f-comp-input { background:transparent; border:none; border-bottom:1px solid var(--text); color:var(--text); border-radius:0; padding:6px 0; font-family:'DM Serif Display',serif; font-size:1.8rem; }
.f-comp-vs { font-family:'DM Serif Display',serif; }
.f-recent-pill { background:var(--bg); border-color:var(--border); border-radius:0; }
.f-sector-card { background:var(--bg); border-color:var(--border); border-radius:0; }
.f-sector-card:hover { transform:none; box-shadow:2px 2px 0 var(--text); border-color:var(--text); }
.f-div-bar { background:var(--text); }
.f-stat-mini { background:var(--bg-2); border-radius:0; }
.f-stress-item { background:var(--bg-2); border-radius:0; border:1px solid var(--border); }
.f-dcf-price--fair { color:var(--green); }
.f-chart-note { background:rgba(26,110,60,.06); color:var(--green); border-left:2px solid var(--green); border-radius:0; padding-left:10px; }
.f-insider-sentiment { background:rgba(26,110,60,.06); color:var(--green); }
.f-footer { background:none; }
.f-loading-bar { background:var(--text); }
.f-sentiment-bar-bull { background:var(--green); }
.f-sentiment-bar-neu { background:var(--amber); }
.f-sentiment-bar-bear { background:var(--red); }

</style>
</head>
<body>
<div id="app"></div>
<script src="../../src/js/templates.js"></script>
<script src="../../src/js/app.js"></script>
</body>
</html>
