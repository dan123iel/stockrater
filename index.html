<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">

<title>futara</title>

<style>
/* ===== DESIGN TOKENS ===== */
:root {
  --bg: #f0edf5;
  --bg-2: #e8e4f0;
  --bg-3: #dedad8;
  --bg-4: #d4d0ce;
  --border: rgba(26,16,40,0.08);
  --border-mid: rgba(26,16,40,0.14);
  --text: #1a1028;
  --text-2: rgba(26,16,40,0.6);
  --text-3: rgba(26,16,40,0.35);
  --accent: #5b21f5;
  --accent-glow: rgba(91,33,245,0.15);
  --green: #2dca72;
  --green-dim: rgba(45,202,114,0.15);
  --red: #fc5050;
  --red-dim: rgba(252,80,80,0.12);
  --amber: #f0a842;
  --amber-dim: rgba(240,168,66,0.12);
  --r: 999px;
  --r-lg: 16px;
  --font-display: 'Space Grotesk', sans-serif;
  --font-body: 'Space Grotesk', sans-serif;
  --font-mono: 'DM Mono', monospace;
}
[data-theme="dark"] {
  --bg: #0e0a1a;
  --bg-2: #141020;
  --bg-3: #1a1528;
  --bg-4: #221c32;
  --border: rgba(255,255,255,0.07);
  --border-mid: rgba(255,255,255,0.12);
  --text: #f0eff5;
  --text-2: rgba(240,239,245,0.6);
  --text-3: rgba(240,239,245,0.35);
  --accent: #7c6cfc;
  --accent-glow: rgba(124,108,252,0.18);
}

/* ===== RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; cursor: none !important; }
html { font-size: 16px; scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 14px;
  line-height: 1.6;
  min-height: 100vh;
  overflow-x: hidden;
}
button { border: none; background: none; font-family: inherit; color: inherit; }
input, select { font-family: inherit; }
a { color: inherit; text-decoration: none; }

/* ===== CUSTOM CURSOR ===== */
#cursor-dot {
  position: fixed;
  width: 10px; height: 10px;
  background: #5b21f5;
  border-radius: 50%;
  pointer-events: none;
  z-index: 99999;
  left: -20px; top: -20px;
  transform: translate(-50%, -50%);
  will-change: left, top;
  transition: width 0.15s, height 0.15s;
}
#cursor-ring { display: none; }
[data-theme="dark"] #cursor-dot { background: #7c6cfc; }

/* ===== TICKER TAPE — dunkel, schmal, fein ===== */
#ticker-tape {
  position: fixed; top: 0; left: 0; right: 0; z-index: 101;
  height: 30px;
  overflow: hidden;
  background: #0e0a1a;
  border-bottom: 1px solid rgba(160,140,255,0.12);
}
[data-theme="light"] #ticker-tape { background: #1a1228; }

/* ===== NAV — unter Ticker-Tape ===== */
#nav {
  position: fixed; top: 38px; left: 50%; transform: translateX(-50%);
  z-index: 100;
  height: 46px;
  display: flex; align-items: center;
  padding: 0 8px 0 12px;
  background: rgba(240,237,245,0.82);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border-radius: 999px;
  box-shadow: 0 2px 16px rgba(26,16,40,.08), 0 0 0 1px rgba(26,16,40,.06);
  gap: 20px;
  width: auto; min-width: 0;
}
[data-theme="dark"] #nav {
  background: rgba(30,28,42,0.85);
  box-shadow: 0 2px 24px rgba(0,0,0,.35), 0 0 0 1px rgba(255,255,255,.07);
}

/* logo — separate left pill */
#nav-logo-pill {
  position: fixed; top: 38px; left: 24px; z-index: 100;
  height: 46px;
  display: flex; align-items: center;
  padding: 0 20px;
  gap: 20px;
  background: rgba(240,237,245,0.82);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border-radius: 999px;
  box-shadow: 0 2px 16px rgba(26,16,40,.08), 0 0 0 1px rgba(26,16,40,.06);
  cursor: none;
}
[data-theme="dark"] #nav-logo-pill {
  background: rgba(30,28,42,0.85);
  box-shadow: 0 2px 24px rgba(0,0,0,.35), 0 0 0 1px rgba(255,255,255,.07);
}
.nav-logo {
  display: flex; align-items: center; gap: 8px;
  font-family: var(--font-body);
  font-size: 15px;
  font-weight: 700;
  letter-spacing: -0.01em;
  color: var(--text);
  cursor: none;
  white-space: nowrap;
  flex-shrink: 0;
}
.nav-logo svg { flex-shrink: 0; display: block; }

/* right icons pill */
#nav-right-pill {
  position: fixed; top: 38px; right: 24px; z-index: 100;
  height: 46px;
  display: flex; align-items: center;
  padding: 0 8px;
  gap: 0;
  background: rgba(240,237,245,0.82);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border-radius: 999px;
  box-shadow: 0 2px 16px rgba(26,16,40,.08), 0 0 0 1px rgba(26,16,40,.06);
}
[data-theme="dark"] #nav-right-pill {
  background: rgba(30,28,42,0.85);
  box-shadow: 0 2px 24px rgba(0,0,0,.35), 0 0 0 1px rgba(255,255,255,.07);
}
.nav-icon-btn {
  width: 34px; height: 34px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%;
  background: #c8ff00;
  color: #1a1028;
  border: none;
  cursor: none;
  flex-shrink: 0;
  transition: transform .15s, opacity .15s;
}
.nav-icon-btn:hover { transform: scale(1.08); opacity: .85; }
.nav-icon-div {
  width: 1px; height: 22px;
  background: rgba(26,16,40,.12);
  margin: 0 6px;
}
[data-theme="dark"] .nav-icon-div { background: rgba(255,255,255,.12); }

/* divider inside main nav */
.nav-div {
  width: 1px; height: 20px;
  background: rgba(26,16,40,.12);
  margin: 0 2px;
  flex-shrink: 0;
}
[data-theme="dark"] .nav-div { background: rgba(255,255,255,.12); }

/* links */
.nav-links { display: flex; gap: 4px; align-items: center; }
.nav-link {
  padding: 6px 14px;
  font-size: 13px;
  font-weight: 400;
  color: rgba(26,16,40,.55);
  border-radius: 999px;
  transition: all 0.15s;
  letter-spacing: 0.005em;
  white-space: nowrap;
  cursor: none;
  background: none; border: none; font-family: var(--font-body);
}
[data-theme="dark"] .nav-link { color: rgba(240,239,245,.45); }
.nav-link:hover {
  color: var(--text); background: none;
  text-decoration: underline; text-underline-offset: 4px; text-decoration-thickness: 1.5px;
}
[data-theme="dark"] .nav-link:hover { color: #fff; background: none; }
.nav-link.active {
  background: var(--accent);
  color: #fff !important;
  font-weight: 600;
  text-decoration: none;
}

/* search button inside main nav */
.nav-search-btn {
  width: 34px; height: 34px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%;
  background: var(--text);
  color: #fff;
  border: none;
  cursor: pointer;
  flex-shrink: 0;
  margin-left: 6px;
  transition: transform .15s, opacity .15s;
}
[data-theme="dark"] .nav-search-btn { background: rgba(255,255,255,.15); }
.nav-search-btn:hover { transform: scale(1.08); opacity: .85; }

/* ===== PAGES ===== */
#app { padding-top: 96px; }
.page { display: none; min-height: calc(100vh - 96px); }
.page.active { display: block; }

/* ===== GLOBAL BACKGROUND — alle Seiten ===== */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: -1;
  background-image: radial-gradient(circle, rgba(91,33,245,.18) 1px, transparent 1px);
  background-size: 26px 26px;
  pointer-events: none;
}
body::after {
  content: '';
  position: fixed; top: -10vh; right: -8vw; z-index: -1;
  width: 55vw; height: 65vh;
  background: radial-gradient(ellipse, rgba(91,33,245,.1) 0%, transparent 65%);
  pointer-events: none;
}

/* ===== HOME PAGE extra deco ===== */
.page-home-bg {
  position: relative;
  overflow: hidden;
}
.dot-grid {
  position: absolute; pointer-events: none; user-select: none;
  background-image: radial-gradient(circle, rgba(91,33,245,.22) 1px, transparent 1px);
  background-size: 26px 26px;
}
[data-theme="dark"] .dot-grid {
  background-image: radial-gradient(circle, rgba(124,108,252,.18) 1px, transparent 1px);
}
.deco-star {
  position: absolute; right: 6vw; top: 30%;
  font-size: clamp(4rem,10vw,8rem);
  color: #c8ff00;
  animation: decoSpin 20s linear infinite;
  pointer-events: none; user-select: none; line-height: 1; z-index: 0;
  mix-blend-mode: multiply;
}
[data-theme="dark"] .deco-star { mix-blend-mode: screen; color: #c8ff00; }
@keyframes decoSpin { to { transform: rotate(360deg) } }
.deco-blob {
  position: absolute; top: -10%; right: -5%;
  width: 55vw; height: 65vh;
  background: radial-gradient(ellipse, rgba(91,33,245,.12) 0%, transparent 65%);
  pointer-events: none; z-index: 0;
}
[data-theme="dark"] .deco-blob {
  background: radial-gradient(ellipse, rgba(91,33,245,.22) 0%, transparent 65%);
}

/* ===== TICKER TAPE ===== */
#ticker-tape {
  background: var(--bg-2);
  border-bottom: 1px solid var(--border);
  overflow: hidden;
  height: 36px;
  position: relative;
}
.ticker-inner {
  display: flex; gap: 0; align-items: center;
  height: 100%;
  white-space: nowrap;
  animation: tickerScroll 80s linear infinite;
}
@keyframes tickerScroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }
.ticker-item {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 0 40px;
  font-size: 11px;
  font-family: var(--font-mono);
  border-right: 1px solid rgba(160,140,255,0.1);
  height: 100%;
  color: rgba(240,237,245,0.6);
}
.ticker-symbol { font-weight: 600; color: rgba(240,237,245,0.85); letter-spacing: 0.02em; }
.ticker-price { color: rgba(240,237,245,0.5); }
.ticker-change { font-weight: 500; }
.ticker-change.up { color: var(--green); }
.ticker-change.dn { color: var(--red); }

/* ===== HOME PAGE ===== */
.hero {
  padding: 100px 60px 80px;
  max-width: 100%; margin: 0;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 60px;
  align-items: center;
}
.hero-label {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 20px;
}
.hero-title {
  font-family: var(--font-display);
  font-size: clamp(48px, 5.5vw, 80px);
  font-weight: 800;
  line-height: 0.96;
  letter-spacing: -0.05em;
  color: var(--text);
  margin-bottom: 24px;
}
.hero-title em { font-style: normal; color: var(--accent); }
.hero-subtitle {
  font-size: 16px;
  color: var(--text-2);
  line-height: 1.7;
  max-width: 480px;
  margin-bottom: 36px;
  font-weight: 300;
}
.search-hero {
  display: flex;
  background: var(--bg-3);
  border: 1px solid var(--border-mid);
  border-radius: 999px;
  overflow: hidden;
  transition: border-color 0.15s, box-shadow 0.15s;
  max-width: 540px;
}
.search-hero:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}
.search-hero input {
  flex: 1; background: none; border: none; outline: none;
  padding: 13px 20px;
  font-size: 14px; color: var(--text);
  font-family: var(--font-body);
}
.search-hero input::placeholder { color: var(--text-3); }
.search-hero button {
  padding: 10px 22px; margin: 5px;
  background: var(--accent);
  color: #fff;
  border-radius: 8px;
  font-size: 13px; font-weight: 500;
  transition: opacity 0.15s;
}
.search-hero button:hover { opacity: 0.85; }
.hero-quick { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }
.hero-quick button {
  padding: 5px 12px;
  background: var(--bg-4);
  border: 1px solid var(--border);
  border-radius: 20px;
  font-size: 12px;
  font-family: var(--font-mono);
  color: var(--text-2);
  transition: all 0.15s;
}
.hero-quick button:hover { border-color: var(--accent); color: var(--accent); }

/* Home dashboard grid */
.home-grid {
  max-width: 100%; margin: 0;
  padding: 0 60px 80px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}
.home-card {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  overflow: hidden;
  transition: border-color 0.2s;
}
.home-card:hover { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
.card-header {
  padding: 16px 20px 12px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border);
}
.card-title {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-3);
}
.card-body { padding: 16px 20px; }

/* Stock row */
.stock-row {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.1s;
  margin: 0 -20px;
  padding-left: 20px; padding-right: 20px;
}
.stock-row:last-child { border-bottom: none; }
.stock-row:hover { background: rgba(255,255,255,0.03); }
[data-theme="light"] .stock-row:hover { background: rgba(0,0,0,0.03); }
.sr-rank { font-size: 11px; color: var(--text-3); font-family: var(--font-mono); width: 16px; }
.sr-info { flex: 1; }
.sr-sym { font-size: 13px; font-weight: 600; font-family: var(--font-mono); }
.sr-name { font-size: 11px; color: var(--text-3); }
.sr-price { font-size: 13px; font-family: var(--font-mono); font-weight: 500; }
.sr-chg { font-size: 12px; font-family: var(--font-mono); font-weight: 500; text-align: right; min-width: 70px; }
.up { color: var(--green); }
.dn { color: var(--red); }

/* Score badge */
.score-badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 8px;
  background: var(--green-dim);
  color: var(--green);
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  font-family: var(--font-mono);
}
.score-badge.med { background: var(--amber-dim); color: var(--amber); }
.score-badge.lo { background: var(--red-dim); color: var(--red); }

/* Sentiment bar */
.sentiment-bar {
  display: flex;
  height: 6px;
  border-radius: 3px;
  overflow: hidden;
  margin: 12px 0;
}
.sentiment-bull { background: var(--green); transition: width 0.6s; }
.sentiment-neu { background: var(--amber); }
.sentiment-bear { background: var(--red); }

/* ===== MINI SPARKLINE ===== */
.sparkline { display: inline-block; }

/* ===== MARKETS PAGE ===== */
.markets-layout {
  max-width: 100%; margin: 0;
  padding: 24px 32px;
  display: grid;
  grid-template-columns: 280px 1fr;
  gap: 20px;
  height: calc(100vh - 96px);
  overflow: hidden;
}
.markets-left { display: flex; flex-direction: column; gap: 12px; overflow-y: auto; }
.markets-right { display: flex; flex-direction: column; gap: 0; overflow: hidden; }
.markets-right { display: flex; flex-direction: column; gap: 16px; }
.panel {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  transition: border-color 0.15s, box-shadow 0.15s;
}
.panel:hover { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
.panel-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
}
.panel-title { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-3); }
.panel-body { padding: 12px 20px; }
.watchlist-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: opacity 0.1s;
}
.watchlist-item:last-child { border-bottom: none; }
.watchlist-item:hover { opacity: 0.75; }
.wi-sym { font-size: 14px; font-weight: 600; font-family: var(--font-mono); width: 56px; }
.wi-price { font-size: 13px; font-family: var(--font-mono); flex: 1; }
.wi-sma { font-size: 11px; }
.sector-bar-wrap { margin: 8px 0; }
.sector-row {
  display: flex; align-items: center; gap: 10px;
  margin: 6px 0;
  font-size: 12px;
}
.sector-name { width: 130px; color: var(--text-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sector-track { flex: 1; height: 4px; background: var(--bg-4); border-radius: 2px; overflow: hidden; }
.sector-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width 0.6s; }
.sector-fill.neg { background: var(--red); }
.sector-val { font-family: var(--font-mono); font-size: 12px; min-width: 48px; text-align: right; }

/* News stream */
.news-item {
  padding: 14px 0;
  border-bottom: 1px solid var(--border);
}
.news-item:last-child { border-bottom: none; }
.news-time { font-size: 11px; font-family: var(--font-mono); color: var(--text-3); margin-bottom: 4px; }
.news-tag {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 20px;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 6px;
}
.tag-macro { background: var(--red-dim); color: var(--red); }
.tag-ticker { background: var(--green-dim); color: var(--green); }
.tag-catalyst { background: var(--amber-dim); color: var(--amber); }
.tag-dividend { background: var(--accent-glow); color: var(--accent); }
.news-title { font-size: 13px; line-height: 1.5; color: var(--text); }
.news-sub { font-size: 12px; color: var(--text-3); margin-top: 4px; }
.news-impact {
  display: inline-block;
  margin-top: 6px;
  font-size: 10px;
  color: var(--text-3);
  font-family: var(--font-mono);
}

/* Heatmap */
.heatmap {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
  padding: 12px 20px;
}
.hmap-cell {
  padding: 10px 8px;
  border-radius: var(--r);
  text-align: center;
  cursor: pointer;
  transition: opacity 0.15s;
}
.hmap-cell:hover { opacity: 0.8; }
.hmap-sym { font-size: 11px; font-weight: 600; font-family: var(--font-mono); }
.hmap-chg { font-size: 12px; font-weight: 600; font-family: var(--font-mono); }
.hmap-pos { background: rgba(45,202,114,0.18); color: var(--green); }
.hmap-neg { background: var(--red-dim); color: var(--red); }

/* ===== ANALYTICS PAGE ===== */
.analytics-layout {
  max-width: 100%; margin: 0;
  padding: 32px 48px;
}

/* Ticker header */
.ticker-hero {
  display: flex; align-items: flex-start; justify-content: space-between;
  margin-bottom: 28px;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--border);
}
.ticker-name { font-size: 12px; color: var(--text-3); font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 4px; }
.ticker-price-big { font-family: var(--font-display); font-size: 48px; font-weight: 800; letter-spacing: -0.04em; line-height: 1; }
.ticker-change-big { font-size: 18px; font-weight: 500; font-family: var(--font-mono); margin-top: 6px; }
.ticker-actions { display: flex; gap: 10px; align-items: flex-start; margin-top: 8px; }
.btn-primary {
  padding: 9px 20px;
  background: var(--accent);
  color: #fff;
  border-radius: var(--r);
  font-size: 13px;
  font-weight: 500;
  transition: opacity 0.15s;
}
.btn-primary:hover { opacity: 0.85; }
.btn-secondary {
  padding: 9px 20px;
  background: var(--bg-4);
  border: 1px solid var(--border-mid);
  border-radius: var(--r);
  font-size: 13px;
  font-weight: 500;
  transition: all 0.15s;
  color: var(--text);
}
.btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

/* Context dock */
.context-dock {
  display: flex; gap: 12px;
  overflow-x: auto;
  padding-bottom: 4px;
  margin-bottom: 28px;
}
.context-dock::-webkit-scrollbar { height: 0; }
.dock-tab {
  flex-shrink: 0;
  padding: 12px 16px;
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  cursor: pointer;
  transition: all 0.15s;
  min-width: 130px;
}
.dock-tab:hover { border-color: var(--border-mid); }
.dock-tab.active { border-color: var(--accent); background: var(--accent-glow); }
.dock-tab-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-3); margin-bottom: 6px; }
.dock-tab.active .dock-tab-label { color: var(--accent); }
.dock-tab-val { font-size: 16px; font-weight: 700; font-family: var(--font-display); color: var(--text); }
.dock-tab-sub { font-size: 11px; color: var(--text-3); font-family: var(--font-mono); margin-top: 2px; }

/* Analytics detail panels */
.analytics-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 16px;
  margin-bottom: 16px;
}
.analytics-grid-2 {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 16px;
  margin-bottom: 16px;
}
.analytics-grid-3 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 16px;
}

/* Score ring */
.score-display {
  text-align: center; padding: 24px 0;
}
.score-big {
  font-family: var(--font-display);
  font-size: 56px;
  font-weight: 800;
  letter-spacing: -0.04em;
  color: var(--green);
  line-height: 1;
}
.score-total { font-size: 18px; color: var(--text-3); }
.score-verdict {
  display: inline-block;
  margin-top: 10px;
  padding: 5px 14px;
  background: var(--green-dim);
  color: var(--green);
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.12em;
}
.score-breakdown { margin-top: 20px; }
.sb-row {
  display: flex; align-items: center; gap: 10px;
  padding: 7px 0;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
}
.sb-row:last-child { border-bottom: none; }
.sb-label { flex: 1; color: var(--text-2); }
.sb-track { width: 100px; height: 3px; background: var(--bg-4); border-radius: 2px; overflow: hidden; }
.sb-fill { height: 100%; background: var(--accent); border-radius: 2px; }
.sb-val { font-family: var(--font-mono); font-size: 12px; min-width: 44px; text-align: right; }

/* Chart placeholder with actual SVG sparkline */
.chart-area {
  padding: 0 0 0;
  height: 120px;
  position: relative;
  overflow: hidden;
}
.chart-area svg { width: 100%; height: 100%; }

/* Ratio table */
.ratio-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.ratio-table th {
  text-align: left; padding: 6px 8px;
  font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em;
  color: var(--text-3);
  border-bottom: 1px solid var(--border);
}
.ratio-table td {
  padding: 9px 8px;
  border-bottom: 1px solid var(--border);
  color: var(--text-2);
}
.ratio-table tr:last-child td { border-bottom: none; }
.ratio-table td:first-child { color: var(--text); font-weight: 500; }
.ratio-table td:last-child { text-align: center; }
.ratio-status {
  padding: 2px 8px;
  border-radius: 20px;
  font-size: 10px;
  font-weight: 600;
}
.rs-good { background: var(--green-dim); color: var(--green); }
.rs-fair { background: var(--amber-dim); color: var(--amber); }
.rs-bad { background: var(--red-dim); color: var(--red); }
.rs-elite { background: rgba(124,108,252,0.15); color: var(--accent); }
.val-mono { font-family: var(--font-mono); }

/* DCF sliders */
.dcf-display {
  text-align: center;
  padding: 16px 0;
}
.dcf-price { font-size: 12px; color: var(--text-3); margin-bottom: 6px; }
.dcf-fair { font-family: var(--font-display); font-size: 36px; font-weight: 800; letter-spacing: -0.04em; color: var(--green); }
.dcf-mos { font-size: 14px; font-family: var(--font-mono); color: var(--green); margin-top: 4px; }
.dcf-sliders { margin-top: 16px; }
.slider-row { margin: 12px 0; }
.slider-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.slider-label { font-size: 12px; color: var(--text-2); }
.slider-val { font-size: 12px; font-family: var(--font-mono); color: var(--accent); font-weight: 500; }
input[type=range] {
  width: 100%; height: 3px;
  -webkit-appearance: none; appearance: none;
  background: var(--bg-4);
  border-radius: 2px;
  outline: none;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
  transition: box-shadow 0.15s;
}
input[type=range]::-webkit-slider-thumb:hover { box-shadow: 0 0 0 4px var(--accent-glow); }
.stresstest { display: flex; gap: 8px; margin-top: 12px; }
.st-item {
  flex: 1;
  padding: 10px;
  background: var(--bg-3);
  border: 1px solid var(--border);
  border-radius: var(--r);
  font-size: 11px;
}
.st-label { color: var(--text-3); margin-bottom: 4px; }
.st-val { font-family: var(--font-mono); font-weight: 600; font-size: 13px; }
.st-val.pos { color: var(--green); }
.st-val.neg { color: var(--red); }

/* Peer comparison chart */
.peer-bar { margin: 8px 0; display: flex; align-items: center; gap: 10px; font-size: 12px; }
.pb-label { width: 52px; font-family: var(--font-mono); font-weight: 600; }
.pb-track { flex: 1; height: 20px; background: var(--bg-4); border-radius: 3px; overflow: hidden; position: relative; }
.pb-fill { height: 100%; border-radius: 3px; display: flex; align-items: center; padding-left: 8px; font-size: 11px; font-family: var(--font-mono); font-weight: 600; color: #fff; }
.pb-fill.main { background: var(--accent); }
.pb-fill.comp { background: rgba(240,168,66,0.5); color: var(--text-2); }
.pb-fill.neg { background: var(--red-dim); color: var(--red); }

/* Insider trades */
.insider-row { display: flex; align-items: center; gap: 8px; padding: 9px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
.insider-row:last-child { border-bottom: none; }
.ins-type { padding: 2px 7px; border-radius: 20px; font-size: 10px; font-weight: 700; }
.ins-buy { background: var(--green-dim); color: var(--green); }
.ins-sell { background: var(--red-dim); color: var(--red); }
.ins-name { flex: 1; }
.ins-pos { color: var(--text-3); font-size: 11px; }
.ins-shares { font-family: var(--font-mono); }
.ins-val { font-family: var(--font-mono); color: var(--text-2); }

/* ===== COMPARISON PAGE ===== */
.comparison-layout {
  max-width: 100%; margin: 0;
  padding: 32px 48px;
}
.comp-setup {
  display: flex; gap: 16px; align-items: center;
  margin-bottom: 32px;
}
.comp-slot {
  flex: 1;
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 16px 20px;
}
.comp-slot-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-3); margin-bottom: 8px; }
.comp-slot input {
  width: 100%;
  background: var(--bg-3);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 9px 12px;
  font-size: 13px;
  color: var(--text);
  font-family: var(--font-mono);
  outline: none;
  transition: border-color 0.15s;
}
.comp-slot input:focus { border-color: var(--accent); }
.comp-vs { color: var(--text-3); font-family: var(--font-display); font-size: 20px; font-weight: 800; }
.btn-launch {
  padding: 13px 28px;
  background: var(--accent);
  color: #fff;
  border-radius: var(--r);
  font-size: 14px;
  font-weight: 600;
  transition: opacity 0.15s;
  white-space: nowrap;
}
.btn-launch:hover { opacity: 0.85; }

/* Comparison table */
.comp-table {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  overflow: hidden;
}
.comp-table-head {
  display: grid;
  grid-template-columns: 220px 1fr 1fr 1fr;
  background: var(--bg-3);
  border-bottom: 1px solid var(--border);
}
.comp-col-header {
  padding: 14px 20px;
  border-right: 1px solid var(--border);
}
.comp-col-header:last-child { border-right: none; }
.comp-col-sym { font-size: 16px; font-weight: 700; font-family: var(--font-mono); color: var(--text); }
.comp-col-name { font-size: 11px; color: var(--text-3); margin-top: 2px; }
.comp-section-label {
  padding: 8px 20px;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--accent);
  background: rgba(124,108,252,0.05);
  border-bottom: 1px solid var(--border);
  border-top: 1px solid var(--border);
}
.comp-row {
  display: grid;
  grid-template-columns: 220px 1fr 1fr 1fr;
  border-bottom: 1px solid var(--border);
}
.comp-row:last-child { border-bottom: none; }
.comp-cell {
  padding: 11px 20px;
  border-right: 1px solid var(--border);
  font-size: 12px;
}
.comp-cell:last-child { border-right: none; }
.comp-cell.metric { color: var(--text-2); font-size: 12px; }
.comp-cell.val { font-family: var(--font-mono); font-size: 13px; font-weight: 500; color: var(--text); }
.comp-cell.best { background: rgba(45,202,114,0.05); }
.comp-btn-row { display: flex; gap: 8px; margin-top: 6px; }

/* Quick battles */
.battles-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-top: 28px;
}
.battle-card {
  padding: 16px 20px;
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  cursor: pointer;
  transition: all 0.15s;
}
.battle-card:hover { border-color: var(--accent); transform: translateY(-1px); }
.battle-icon { font-size: 20px; margin-bottom: 8px; }
.battle-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
.battle-tickers { font-family: var(--font-mono); font-size: 11px; color: var(--text-3); }
.battle-tag { font-size: 10px; color: var(--accent); margin-top: 6px; font-weight: 500; }

/* ===== PORTFOLIO PAGE ===== */
.portfolio-layout {
  max-width: 100%; margin: 0;
  padding: 32px 48px;
}
.portfolio-header {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 24px;
}
.port-stat {
  padding: 16px 20px;
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
}
.port-stat-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-3); margin-bottom: 6px; }
.port-stat-val { font-family: var(--font-display); font-size: 28px; font-weight: 800; letter-spacing: -0.04em; color: var(--text); }
.port-stat-sub { font-size: 12px; font-family: var(--font-mono); margin-top: 4px; }

.portfolio-grid {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 16px;
}
.holdings-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.holdings-table th {
  text-align: left; padding: 9px 16px;
  font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em;
  color: var(--text-3);
  border-bottom: 1px solid var(--border);
}
.holdings-table td { padding: 12px 16px; border-bottom: 1px solid var(--border); }
.holdings-table tr:last-child td { border-bottom: none; }
.holdings-table tr:hover td { background: rgba(255,255,255,0.02); }
[data-theme="light"] .holdings-table tr:hover td { background: rgba(0,0,0,0.02); }
.hold-sym { font-weight: 700; font-family: var(--font-mono); color: var(--text); }
.hold-name { font-size: 11px; color: var(--text-3); margin-top: 1px; }

/* Alloc pie chart placeholder */
.alloc-chart {
  position: relative;
  width: 140px; height: 140px;
  margin: 16px auto;
}
.alloc-list { margin-top: 8px; }
.alloc-item {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 0;
  font-size: 12px;
}
.alloc-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.alloc-name { flex: 1; color: var(--text-2); }
.alloc-pct { font-family: var(--font-mono); font-weight: 600; }

/* Leverage desk */
.leverage-card {
  padding: 14px 20px;
  margin-bottom: 8px;
  background: rgba(45,202,114,0.06);
  border: 1px solid rgba(45,202,114,0.2);
  border-radius: var(--r-lg);
}
.lev-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.lev-sym { font-size: 14px; font-weight: 700; font-family: var(--font-mono); }
.lev-badge {
  padding: 2px 8px;
  background: var(--green-dim);
  color: var(--green);
  border-radius: 20px;
  font-size: 10px;
  font-weight: 700;
}
.lev-levels { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
.lev-level { font-size: 11px; color: var(--text-3); }
.lev-level span { font-family: var(--font-mono); font-size: 12px; font-weight: 600; color: var(--text); }

/* ===== PROFILE PAGE ===== */
.profile-layout {
  max-width: 800px; margin: 0 auto;
  padding: 48px 48px;
}
.profile-section {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  overflow: hidden;
  margin-bottom: 16px;
}
.profile-section-head {
  padding: 16px 24px;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--text-3);
}
.profile-section-body { padding: 20px 24px; }
.setting-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}
.setting-row:last-child { border-bottom: none; }
.setting-label { font-size: 13px; color: var(--text); font-weight: 500; }
.setting-desc { font-size: 12px; color: var(--text-3); margin-top: 2px; }

/* Toggle */
.toggle-wrap { display: flex; gap: 4px; }
.toggle-btn {
  padding: 6px 14px;
  border-radius: var(--r);
  font-size: 12px;
  font-weight: 500;
  border: 1px solid var(--border);
  color: var(--text-3);
  background: var(--bg-4);
  transition: all 0.15s;
}
.toggle-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* API key field */
.api-field {
  display: flex; gap: 10px; align-items: center;
  padding: 10px 14px;
  background: var(--bg-3);
  border: 1px solid var(--border);
  border-radius: var(--r);
  margin-top: 8px;
}
.api-key-val { flex: 1; font-family: var(--font-mono); font-size: 12px; color: var(--text-3); }
.api-status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); flex-shrink: 0; }

.select-field {
  background: var(--bg-3);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 7px 12px;
  font-size: 13px;
  color: var(--text);
  outline: none;
  cursor: pointer;
  min-width: 140px;
  transition: border-color 0.15s;
}
.select-field:focus { border-color: var(--accent); }

/* Plan badge */
.plan-info { display: flex; gap: 16px; align-items: center; }
.plan-badge {
  padding: 5px 14px;
  background: var(--bg-4);
  border: 1px solid var(--border-mid);
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  font-family: var(--font-mono);
  color: var(--text-2);
}
.req-bar-wrap { flex: 1; }
.req-bar {
  height: 4px; background: var(--bg-4);
  border-radius: 2px; overflow: hidden; margin-top: 4px;
}
.req-fill { height: 100%; background: var(--accent); border-radius: 2px; width: 84%; }

/* ===== ANALYTICS START ===== */
.analytics-start-layout {
  max-width: 800px; margin: 0 auto;
  padding: 60px 48px;
  text-align: center;
}
.start-title {
  font-family: var(--font-display);
  font-size: 36px;
  font-weight: 800;
  letter-spacing: -0.04em;
  margin-bottom: 12px;
}
.start-sub { font-size: 15px; color: var(--text-2); margin-bottom: 36px; font-weight: 300; }
.search-analytics {
  display: flex;
  background: var(--bg-2);
  border: 1px solid var(--border-mid);
  border-radius: 999px;
  overflow: hidden;
  margin-bottom: 32px;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.search-analytics:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
.search-analytics input {
  flex: 1; background: none; border: none; outline: none;
  padding: 16px 22px; font-size: 16px; color: var(--text);
  font-family: var(--font-body);
}
.search-analytics input::placeholder { color: var(--text-3); }
.search-analytics button {
  padding: 12px 24px; margin: 8px;
  background: var(--accent);
  color: #fff;
  border-radius: var(--r);
  font-size: 14px;
  font-weight: 600;
  transition: opacity 0.15s;
}
.search-analytics button:hover { opacity: 0.85; }

.recent-pills { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 40px; }
.recent-pill {
  padding: 8px 16px;
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  cursor: pointer;
  transition: all 0.15s;
}
.recent-pill:hover { border-color: var(--accent); }
.rp-sym { font-size: 14px; font-weight: 700; font-family: var(--font-mono); }
.rp-score { font-size: 11px; color: var(--text-3); margin-top: 2px; }

.sectors-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.sector-card {
  padding: 14px 16px;
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  text-align: left;
  cursor: pointer;
  transition: all 0.15s;
}
.sector-card:hover { border-color: var(--border-mid); transform: translateY(-1px); }
.sc-icon { font-size: 18px; margin-bottom: 8px; }
.sc-name { font-size: 13px; font-weight: 600; }
.sc-pe { font-size: 11px; color: var(--text-3); font-family: var(--font-mono); margin-top: 2px; }
.sc-top { font-size: 11px; color: var(--accent); margin-top: 6px; font-weight: 500; }

/* ===== MISC ===== */
.section-divider { margin: 32px 0; }
.section-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--text-3);
  margin-bottom: 12px;
}
.expand-btn {
  font-size: 11px; color: var(--text-3);
  padding: 4px 8px;
  border-radius: var(--r);
  transition: all 0.15s;
}
.expand-btn:hover { color: var(--text); background: var(--bg-4); }

/* ===== NAV INLINE SEARCH (expandiert nach rechts) ===== */
#nav-search-wrap {
  display: flex; align-items: center;
  overflow: hidden;
  max-width: 0; opacity: 0;
  transition: max-width 0.35s cubic-bezier(.16,1,.3,1), opacity 0.25s;
  position: relative;
}
#nav-search-wrap.open { max-width: 280px; opacity: 1; }
#nav-search-input {
  background: none; border: none; outline: none;
  font-size: 13px; color: var(--text); font-family: var(--font-body);
  width: 240px; padding: 0 12px;
}
#nav-search-input::placeholder { color: var(--text-3); }
[data-theme="dark"] #nav-search-input { color: #fff; }

/* Search dropdown under nav */
#nav-search-dropdown {
  position: absolute; top: calc(100% + 8px); left: 0; right: 0;
  background: var(--bg);
  border: 1px solid var(--border-mid);
  border-radius: 16px;
  padding: 6px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.15);
  z-index: 201;
  display: none;
  min-width: 280px;
}
[data-theme="dark"] #nav-search-dropdown { background: var(--bg-2); }
#nav-search-dropdown.open { display: block; }
.sm-result-item {
  display: flex; align-items: center; gap: 12px;
  padding: 9px 12px; border-radius: 999px; transition: background 0.1s;
}
.sm-result-item:hover { background: var(--bg-4); }
.sri-sym { font-size: 13px; font-weight: 700; font-family: var(--font-mono); width: 56px; color: var(--accent); }
.sri-name { flex: 1; font-size: 13px; color: var(--text-2); }
.sri-type { font-size: 10px; color: var(--text-3); font-family: var(--font-mono); }

/* News modal overlay */
#news-modal {
  position: fixed; inset: 0; z-index: 300;
  background: rgba(14,10,26,0.75); backdrop-filter: blur(10px);
  display: none; align-items: center; justify-content: center;
}
[data-theme="light"] #news-modal { background: rgba(240,237,245,0.8); }
#news-modal.open { display: flex; }
.news-modal-box {
  width: min(720px, 92vw); max-height: 80vh;
  background: var(--bg-2); border: 1px solid var(--border-mid);
  border-radius: 20px; overflow: hidden;
  display: flex; flex-direction: column;
  box-shadow: 0 24px 80px rgba(0,0,0,0.4);
}
.news-modal-img { width: 100%; height: 200px; object-fit: cover; }
.news-modal-body { padding: 24px; overflow-y: auto; flex: 1; }
.news-modal-source { font-size: 11px; color: var(--accent); font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; }
.news-modal-title { font-size: 20px; font-weight: 700; line-height: 1.3; margin-bottom: 12px; }
.news-modal-summary { font-size: 14px; color: var(--text-2); line-height: 1.7; }
.news-modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }

/* News card grid */
.news-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 12px;
}
.news-card {
  background: var(--bg-2); border: 1px solid var(--border);
  border-radius: 16px; overflow: hidden;
  transition: border-color 0.15s, transform 0.15s;
  cursor: pointer;
}
.news-card:hover { border-color: var(--accent); transform: translateY(-2px); }
.news-card-img { width: 100%; height: 140px; object-fit: cover; background: var(--bg-3); }
.news-card-body { padding: 12px 14px; }
.news-card-source { font-size: 10px; color: var(--accent); font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 5px; }
.news-card-title { font-size: 13px; font-weight: 600; line-height: 1.4; color: var(--text); }
.news-card-time { font-size: 10px; color: var(--text-3); font-family: var(--font-mono); margin-top: 6px; }

/* Footer */
footer {
  border-top: 1px solid var(--border);
  padding: 20px 48px;
  max-width: 100%; margin: 0;
  display: flex; align-items: center; justify-content: space-between;
  font-size: 11px; color: var(--text-3);
  position: relative;
  background-image: radial-gradient(circle, rgba(91,33,245,.15) 1px, transparent 1px);
  background-size: 26px 26px;
}
footer .fl { display: flex; gap: 20px; }
footer a { transition: color 0.15s; }
footer a:hover { color: var(--text-2); }

/* Scrollbar */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg-4); border-radius: 2px; }

/* Tooltip */
.tt { position: relative; }
.tt::after {
  content: attr(data-tip);
  position: absolute; bottom: 120%; left: 50%; transform: translateX(-50%);
  background: var(--bg-4); color: var(--text); font-size: 11px;
  padding: 4px 8px; border-radius: 4px; white-space: nowrap;
  opacity: 0; pointer-events: none; transition: opacity 0.15s;
}
.tt:hover::after { opacity: 1; }

/* Animations */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.page.active { animation: fadeUp 0.2s ease-out; }
</style>
</head>

<script src="src/js/app.js"></script>
</body>
